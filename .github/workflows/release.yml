name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for crates.io Trusted Publishing (OIDC)

jobs:
  publish-crates:
    name: publish to crates.io
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish macstate-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p macstate-sys

      - name: Publish macstate-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p macstate-core

      - name: Publish macstate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p macstate


  build:
    name: build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin macstate --target ${{ matrix.target }}

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="macstate-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/macstate" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"
          echo "tarball=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macstate-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.sha }}

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true

  bump-tap:
    name: bump homebrew-tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Bump Formula/macstate.rb in DaveDev42/homebrew-tap
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: macstate
          formula-path: Formula/macstate.rb
          homebrew-tap: DaveDev42/homebrew-tap
          base-branch: main
          download-url: https://github.com/DaveDev42/macstate/releases/download/${{ github.ref_name }}/macstate-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          commit-message: |
            macstate {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
